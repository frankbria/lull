# Local Postgres for dev + tests. Staging uses a managed/VPS Postgres via LULL_DATABASE_URL.
# Start:  docker compose -f apps/api/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lull
      POSTGRES_PASSWORD: lull
      POSTGRES_DB: lull
    ports:
      # Loopback-only: never expose dev Postgres (weak lull:lull creds) on a reachable interface.
      - "127.0.0.1:5432:5432"
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d:ro
      - lull_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lull -d lull"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lull_pgdata:
