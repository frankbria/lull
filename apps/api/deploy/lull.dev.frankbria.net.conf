# Lull API (#55) — nginx reverse proxy for the shared VPS. Install to
# /etc/nginx/sites-available/lull.dev.frankbria.net, symlink into sites-enabled, then
# `certbot --nginx -d lull.dev.frankbria.net` adds the 443 server + http->https redirect
# (managed by Certbot), matching the other api.* sites on this box. Proxies to the loopback
# port the prod compose binds — nothing else on the box is touched.
server {
    listen 80;
    listen [::]:80;
    server_name lull.dev.frankbria.net;

    # Generation (LLM + ElevenLabs synth) can take a while — don't 504 a slow render.
    proxy_read_timeout 300s;
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
