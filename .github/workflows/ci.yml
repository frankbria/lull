name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref — cheaper, and re-runs are idempotent.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true              # caches uv's download/build cache
          cache-dependency-glob: apps/api/uv.lock
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest -q

  mobile:
    name: mobile (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4         # version from root package.json packageManager
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm                       # caches the pnpm store
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter mobile typecheck
      - run: pnpm --filter mobile lint
